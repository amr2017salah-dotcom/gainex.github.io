<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تفعيل العضويات الرسمية - GAINEX</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <header class="bg-slate-800 border-b border-slate-700 p-4 text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold text-emerald-400">بوابة تفعيل العضويات الرقمية </h1>
<p class="text-xs text-slate-400 mt-1" style="color: #94a3b8; font-size: 0.75rem; margin-top: 0.25rem; font-family: sans-serif;">
    سجل بياناتك وقم بالتحويل على رقم 
    <span style="color: #00FF66; font-weight: bold; font-size: 0.85rem; margin: 0 4px; text-shadow: 0 0 8px rgba(0,255,102,0.6); user-select: all;">010XXXXXXXX</span> 
    ثم ارفق لقطة الإيصال لتفعيل حسابك.
</p> 
    </header>

    <main class="container mx-auto max-w-md p-4 flex-grow">
        <!-- Step 1 -->
        <div class="bg-slate-800 rounded-2xl p-5 mb-4 border border-slate-700 shadow-xl">
            <h2 class="text-sm font-bold mb-4 text-slate-200 border-r-4 border-emerald-500 pr-2">1. البيانات الشخصية</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">اسم المستخدم على تلجرام (Telegram Username)</label>
                    <input type="text" id="tg_username" placeholder="@username" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 text-sm focus:outline-none focus:border-emerald-500 text-left font-mono" dir="ltr" required>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">رقم الهاتف (تأكيد محفظة كاش / إنستا باي)</label>
                    <input type="tel" id="user_phone" placeholder="01xxxxxxxxx" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 text-sm focus:outline-none focus:border-emerald-500 text-left font-mono" dir="ltr" required>
                </div>
            </div>
        </div>

        <!-- Step 2 -->
        <div class="mb-4">
            <h2 class="text-sm font-bold mb-3 text-slate-200 border-r-4 border-emerald-500 pr-2">2. اختر باقة الاشتراك المحولة:</h2>
            <div id="packages-container" class="space-y-2">
                <div class="text-center p-4 text-xs text-slate-400">جاري تحميل الباقات المحدثة فوريّاً...</div>
            </div>
        </div>

        <!-- Step 3 -->
        <div class="bg-slate-800 rounded-2xl p-5 mb-6 border border-slate-700 shadow-xl">
            <h2 class="text-sm font-bold mb-2 text-slate-200 border-r-4 border-emerald-500 pr-2">3. إرفاق إيصال التحويل الرقمي</h2>
            <div class="flex items-center justify-center w-full">
                <label class="flex flex-col items-center justify-center w-full h-36 border-2 border-slate-600 border-dashed rounded-xl cursor-pointer bg-slate-900 hover:bg-slate-850 transition-all duration-200">
                    <div class="flex flex-col items-center justify-center text-center px-2">
                        <p class="text-xs text-slate-400"><span class="font-semibold text-emerald-400">اضغط هنا لاختيار الإيصال</span></p>
                        <p id="file-name-display" class="text-xs text-cyan-400 mt-2 font-mono"></p>
                    </div>
                    <input type="file" id="receipt_image" accept="image/*" class="hidden" onchange="processSelectedImage()"/>
                </label>
            </div>
        </div>

        <button id="submit-btn" onclick="sendDirectToTelegram()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold p-4 rounded-xl shadow-lg transition-all flex justify-center items-center text-base">
            <span>تأكيد الاشتراك وإرسال الإيصال فوراً</span>
        </button>
    </main>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // 📥 إعدادات الهوية الحية (ضع بيانات توكن بوت فاذر والأيدي الشخصي الخاص بك هنا)
        const BOT_TOKEN = "8913713791:AAEQ5VWLTiNvCTQ5w_Oh-zBQotVFFukOdlo";
        const ADMIN_CHAT_ID = "907815398";

        // الباقات الافتراضية الذكية
        let subscriptionPackages = [
            { id: "1m", duration: "شهر واحد", price: 300, tag: "السعر الأساسي" },
            { id: "3m", duration: "3 شهور", price: 700, tag: "وفر 200 جنيه" },
            { id: "6m", duration: "6 شهور", price: 1200, tag: "وفر 600 جنيه" },
            { id: "1y", duration: "سنة كاملة", price: 1800, tag: "وفر 1800 جنيه (الأكثر طلباً)" }
        ];

        let selectedTier = "سنة كاملة";
        let selectedPrice = 1800;
        let selectedFileBlob = null;

        function fetchCloudDataAndRender() {
            const localCloudData = localStorage.getItem('amr_packages_cloud');
            if(localCloudData) {
                subscriptionPackages = JSON.parse(localCloudData);
            }
            renderPackagesUI();
        }

        function renderPackagesUI() {
            const container = document.getElementById('packages-container');
            container.innerHTML = '';
            
            subscriptionPackages.forEach((pkg, index) => {
                const isSelected = index === subscriptionPackages.length - 1; 
                if(isSelected) { selectedTier = pkg.duration; selectedPrice = pkg.price; }
                
                const cardStyle = isSelected ? 'border-emerald-500 bg-slate-800 ring-2 ring-emerald-500/30' : 'border-slate-700 bg-slate-800/60';
                const checkedAttr = isSelected ? 'checked' : '';

                container.innerHTML += `
                    <div onclick="selectActiveTier('${pkg.id}', ${pkg.price}, '${pkg.duration}')" id="card-${pkg.id}" class="package-card border rounded-xl p-4 cursor-pointer hover:bg-slate-800 transition-all ${cardStyle}">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="membership_tier" id="radio-${pkg.id}" ${checkedAttr} class="text-emerald-500">
                                <div>
                                    <h3 class="font-bold text-sm text-slate-100">${pkg.duration}</h3>
                                    <span class="text-[11px] text-emerald-400">${pkg.tag}</span>
                                </div>
                            </div>
                            <span class="text-base font-bold text-slate-100">${pkg.price} ج.م</span>
                        </div>
                    </div>
                `;
            });
        }

        function selectActiveTier(id, price, duration) {
            selectedPrice = price;
            selectedTier = duration;
            document.querySelectorAll('.package-card').forEach(card => card.classList.remove('border-emerald-500', 'ring-2', 'ring-emerald-500/30'));
            document.getElementById(`card-${id}`).classList.add('border-emerald-500', 'ring-2', 'ring-emerald-500/30');
            document.getElementById(`radio-${id}`).checked = true;
        }

        function processSelectedImage() {
            const fileInput = document.getElementById('receipt_image');
            if(fileInput.files.length > 0) {
                selectedFileBlob = fileInput.files[0];
                document.getElementById('file-name-display').innerText = `✓ تم تجهيز صورة الإيصال`;
            }
        }

        const tgInstance = window.Telegram?.WebApp;
        if (tgInstance) { 
            tgInstance.expand();
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('update')) {
                try {
                    const decodedData = JSON.parse(decodeURIComponent(urlParams.get('update')));
                    localStorage.setItem('amr_packages_cloud', JSON.stringify(decodedData));
                    subscriptionPackages = decodedData;
                } catch(e){}
            }
        }

        function sendDirectToTelegram() {
            const username = document.getElementById('tg_username').value.trim();
            const phone = document.getElementById('user_phone').value.trim();

            if (!username || !phone || !selectedFileBlob) {
                alert('يرجى ملء الاسم، الهاتف، وإرفاق صورة الإيصال أولاً.');
                return;
            }

            const actionBtn = document.getElementById('submit-btn');
            actionBtn.disabled = true;
            actionBtn.innerText = "جاري الإرسال المباشر لتلجرام...";

            const captionText = `🚨 *طلب تفعيل اشتراك جديد* \n\n` +
                                `👤 *العميل:* ${username}\n` +
                                `📞 *رقم الهاتف:* ${phone}\n` +
                                `📦 *الباقة:* ${selectedTier}\n` +
                                `💰 *المبلغ المحول:* ${selectedPrice} ج.م\n\n` +
                                `⚠️ *تأكد من حسابك البنكي ثم قم بتفعيل العميل يدوياً.*`;

            const formData = new FormData();
            formData.append('chat_id', ADMIN_CHAT_ID);
            formData.append('photo', selectedFileBlob);
            formData.append('caption', captionText);
            formData.append('parse_mode', 'Markdown');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(json => {
                if(json.ok) {
                    alert('🎯 تم إرسال طلبك وإيصالك بنجاح! سيتم مراجعة التحويل وتفعيل حسابك فوراً.');
                    if(tgInstance) { tgInstance.close(); }
                } else {
                    alert('خطأ: تأكد من صحة التوكن والـ Chat ID في الكود.');
                }
            })
            .catch(() => alert('حدث خطأ أثناء إرسال البيانات مباشرة.'))
            .finally(() => {
                actionBtn.disabled = false;
                actionBtn.innerText = "تأكيد الاشتراك وإرسال الإيصال فوراً";
            });
        }

        window.onload = fetchCloudDataAndRender;
    </script>
</body>
</html>
