<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تفعيل العضويات الرسمية</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <header class="bg-slate-800 border-b border-slate-700 p-4 text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold text-emerald-400">بوابة تفعيل العضويات الرقمية</h1>
        <p class="text-xs text-slate-400 mt-1">سجل بياناتك وارفق لقطة الإيصال لتفعيل حسابك بأمان</p>
    </header>

    <main class="container mx-auto max-w-md p-4 flex-grow">
        <!-- Step 1 -->
        <div class="bg-slate-800 rounded-2xl p-5 mb-4 border border-slate-700 shadow-xl">
            <h2 class="text-sm font-bold mb-4 text-slate-200 border-r-4 border-emerald-500 pr-2">1. البيانات الشخصية</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">اسم المستخدم على تلجرام (Telegram Username)</label>
                    <input type="text" id="tg_username" placeholder="@username" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 text-sm focus:outline-none focus:border-emerald-500 text-left font-mono" dir="ltr" required>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">رقم الهاتف للتحويل</label>
                    <input type="tel" id="user_phone" placeholder="01xxxxxxxxx" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 text-sm focus:outline-none focus:border-emerald-500 text-left font-mono" dir="ltr" required>
                </div>
            </div>
        </div>

        <!-- Step 2 -->
        <div class="mb-4">
            <h2 class="text-sm font-bold mb-3 text-slate-200 border-r-4 border-emerald-500 pr-2">2. اختر باقة الاشتراك:</h2>
            <div id="packages-container" class="space-y-2"></div>
        </div>

        <!-- Step 3 -->
        <div class="bg-slate-800 rounded-2xl p-5 mb-6 border border-slate-700 shadow-xl">
            <h2 class="text-sm font-bold mb-2 text-slate-200 border-r-4 border-emerald-500 pr-2">3. إرفاق إيصال التحويل الرقمي</h2>
            <div class="flex items-center justify-center w-full">
                <label class="flex flex-col items-center justify-center w-full h-36 border-2 border-slate-600 border-dashed rounded-xl cursor-pointer bg-slate-900 hover:bg-slate-850 transition-all duration-200">
                    <div class="flex flex-col items-center justify-center text-center px-2">
                        <p class="text-xs text-slate-400"><span class="font-semibold text-emerald-400">اضغط هنا لاختيار الإيصال</span></p>
                        <p id="file-name-display" class="text-xs text-cyan-400 mt-2 font-mono truncate max-w-xs"></p>
                    </div>
                    <input type="file" id="receipt_image" accept="image/*" class="hidden" onchange="processSelectedImage()"/>
                </label>
            </div>
        </div>

        <button id="submit-btn" onclick="executeGooglePipeline()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold p-4 rounded-xl shadow-lg transition-all duration-200 flex justify-center items-center text-base">
            <span>تأكيد الاشتراك وإرسال الإيصال للتفعيل</span>
        </button>
    </main>

    <footer class="bg-slate-950 p-3 text-center border-t border-slate-850">
        <p class="text-[10px] text-slate-500 tracking-wider font-mono">POWERED BY GOOGLE SECURE PIPELINE // FREE & UNLIMITED</p>
    </footer>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // هنا تضع الرابط الذي سنحصل عليه من جوجل شيت في الخطوة الرابعة والاخيرة
        const GOOGLE_SCRIPT_URL = "ضع_رابط_جوجل_الجديد_هنا";

        let packages = [
            { id: "1m", duration: "شهر واحد", price: 300, tag: "السعر الأساسي" },
            { id: "1y", duration: "سنة كاملة", price: 1800, tag: "وفر 1800 جنيه (الأكثر طلباً)" }
        ];

        function renderClientPackages() {
            const container = document.getElementById('packages-container');
            container.innerHTML = '';
            packages.forEach(pkg => {
                container.innerHTML += `
                    <div onclick="selectActiveTier('${pkg.id}')" id="card-${pkg.id}" class="package-card border border-slate-700 bg-slate-800/60 rounded-xl p-4 cursor-pointer hover:bg-slate-800">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="membership_tier" id="radio-${pkg.id}" class="text-emerald-500">
                                <div>
                                    <h3 class="font-bold text-sm text-slate-100">${pkg.duration}</h3>
                                    <span class="text-[11px] text-emerald-400">${pkg.tag}</span>
                                </div>
                            </div>
                            <span class="text-base font-bold text-slate-100">${pkg.price} ج.م</span>
                        </div>
                    </div>
                `;
            });
            selectActiveTier("1y");
        }

        let selectedTierId = "1y";
        let base64AssetString = ""; 

        function selectActiveTier(id) {
            selectedTierId = id;
            document.querySelectorAll('.package-card').forEach(card => card.classList.remove('border-emerald-500', 'ring-2', 'ring-emerald-500/30'));
            document.getElementById(`card-${id}`).classList.add('border-emerald-500', 'ring-2', 'ring-emerald-500/30');
            document.getElementById(`radio-${id}`).checked = true;
        }

        function processSelectedImage() {
            const fileInput = document.getElementById('receipt_image');
            if(fileInput.files.length > 0) {
                document.getElementById('file-name-display').innerText = `✓ تم إرفاق الإيصال`;
                const reader = new FileReader();
                reader.onload = function(e) { base64AssetString = e.target.result; }
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        const tgInstance = window.Telegram?.WebApp;
        if (tgInstance) { tgInstance.expand(); }

        function executeGooglePipeline() {
            const username = document.getElementById('tg_username').value.trim();
            const phone = document.getElementById('user_phone').value.trim();
            const targetPkg = packages.find(p => p.id === selectedTierId);

            if (!username || !phone || !base64AssetString) {
                alert('يرجى ملء الحقول وإرفاق الإيصال أولاً.');
                return;
            }

            const actionBtn = document.getElementById('submit-btn');
            actionBtn.disabled = true;
            actionBtn.innerText = "جاري الإرسال الفوري للأنظمة...";

            const payload = {
                telegram_user: username,
                phone_number: phone,
                package_title: targetPkg.duration,
                amount_paid: targetPkg.price,
                receipt_file_base64: base64AssetString
            };

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert('🎯 تم إرسال طلبك بنجاح! سيصلك إشعار التفعيل في الخاص فور مراجعة المشرف للتحويل.');
                if(tgInstance) { tgInstance.close(); }
            })
            .catch(() => alert('حدث خطأ في الاتصال بالسيرفر المجاني.'))
            .finally(() => {
                actionBtn.disabled = false;
                actionBtn.innerText = "تأكيد الاشتراك وإرسال الإيصال للتفعيل";
            });
        }
        window.onload = renderClientPackages;
    </script>
</body>
</html>
