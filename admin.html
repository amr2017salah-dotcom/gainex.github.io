<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة - GAINEX</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 flex flex-col justify-between">

    <!-- شاشة تسجيل الدخول المحمية -->
    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center">
            <h1 class="text-xl font-bold text-emerald-400 mb-2">تسجيل دخول الإدارة</h1>
            <p class="text-xs text-slate-400 mb-6">أدخل كلمة المرور السرية لفتح لوحة التحكم</p>
            <input type="password" id="admin-pass" placeholder="كلمة المرور" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm text-center focus:outline-none focus:border-emerald-500 font-mono mb-4">
            <button onclick="verifyAdminAccess()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold p-3 rounded-xl transition-all">دخول اللوحة</button>
        </div>
    </div>

    <!-- واجهة التحكم الأساسية -->
    <main class="container mx-auto max-w-md flex-grow pt-4">
        <header class="mb-6 text-center border-b border-slate-800 pb-4">
            <h1 class="text-xl font-bold text-cyan-400">لوحة إدارة الباقات الديناميكية</h1>
            <p class="text-xs text-slate-500 mt-1">تحديث الأسعار فوريّاً وبدون الحاجة لدخول GitHub</p>
        </header>

        <section class="space-y-4" id="packages-list-editor">
            <!-- سيتم توليد واجهة التعديل هنا تلقائياً -->
        </section>

        <!-- زر الحفظ والإرسال السحابي -->
        <div class="mt-8">
            <button onclick="publishNewPricesToTelegram()" id="save-btn" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold p-4 rounded-xl shadow-lg transition-all flex justify-center items-center gap-2 text-base">
                <span>💾 حفظ وإرسال التحديث السحابي</span>
            </button>
        </div>
    </main>

    <footer class="p-4 text-center border-t border-slate-900 text-[10px] text-slate-600 font-mono tracking-wider">
        GAINEX MANAGEMENT SYSTEM // ZERO-COST ARCHITECTURE
    </footer>

    <script>
        // 📥 الإعدادات الأمنية والربط الفوري (تحديث فوري لرابط حساب مستودعك الذاتي)
        const BOT_TOKEN = "8913713791:AAEQ5VWLTiNvCTQ5w_Oh-zBQotVFFukOdlo";
        const ADMIN_CHAT_ID = "907815398";
        const CLIENT_PAGE_URL = "https://amr2017salah-dotcom.github.io/gainex.github.io/"; 
        const SECRET_PASSWORD = "123"; // كلمة المرور الافتراضية الخاصة بك لفتح الصفحة

        let currentPackages = [
            { id: "1m", duration: "شهر واحد", price: 300, tag: "السعر الأساسي" },
            { id: "3m", duration: "3 شهور", price: 700, tag: "وفر 200 جنيه" },
            { id: "6m", duration: "6 شهور", price: 1200, tag: "وفر 600 جنيه" },
            { id: "1y", duration: "سنة كاملة", price: 1800, tag: "وفر 1800 جنيه (الأكثر طلباً)" }
        ];

        function verifyAdminAccess() {
            const inputPass = document.getElementById('admin-pass').value;
            if(inputPass === SECRET_PASSWORD) {
                document.getElementById('login-screen').classList.add('hidden');
                loadPackagesEditor();
            } else {
                alert('كلمة المرور غير صحيحة!');
            }
        }

        function loadPackagesEditor() {
            const container = document.getElementById('packages-list-editor');
            container.innerHTML = '';
            
            const savedData = localStorage.getItem('amr_packages_cloud');
            if(savedData) { currentPackages = JSON.parse(savedData); }

            currentPackages.forEach((pkg, index) => {
                container.innerHTML += `
                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-md space-y-3">
                        <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                            <span class="text-xs font-bold text-emerald-400">باقة: ${pkg.duration}</span>
                            <span class="text-[10px] text-slate-500 font-mono">ID: ${pkg.id}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-[10px] text-slate-500 mb-1">السعر (ج.م)</label>
                                <input type="number" id="price-${index}" value="${pkg.price}" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs font-mono focus:outline-none focus:border-cyan-500 text-center">
                            </div>
                            <div>
                                <label class="block text-[10px] text-slate-500 mb-1">نص الترويج / التوفير</label>
                                <input type="text" id="tag-${index}" value="${pkg.tag}" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:outline-none focus:border-cyan-500">
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function publishNewPricesToTelegram() {
            currentPackages.forEach((pkg, index) => {
                pkg.price = Number(document.getElementById(`price-${index}`).value);
                pkg.tag = document.getElementById(`tag-${index}`).value.trim();
            });

            localStorage.setItem('amr_packages_cloud', JSON.stringify(currentPackages));

            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "جاري معالجة ونشر التحديث السحابي...";

            const jsonString = JSON.stringify(currentPackages);
            const encodedUpdate = encodeURIComponent(jsonString);
            const finalActivationLink = `${CLIENT_PAGE_URL}?update=${encodedUpdate}`;

            const messageText = `⚙️ *إشعار تحديث الأسعار سحابيّاً - GAINEX* \n\n` +
                                `📬 لقد قمت بتعديل الأسعار وباقات الاشتراك من لوحة التحكم المنفصلة.\n\n` +
                                `🎯 *لتفعيل الأسعار الجديدة فوراً لجميع المشتركين، اضغط على الرابط التالي مرة واحدة فقط:* \n\n` +
                                `🔗 [اضغط هنا لتفعيل وتحديث النظام](${finalActivationLink})`;

            const formData = new FormData();
            formData.append('chat_id', ADMIN_CHAT_ID);
            formData.append('text', messageText);
            formData.append('parse_mode', 'Markdown');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(json => {
                if(json.ok) {
                    alert('🎯 تم حفظ التعديلات وإرسال رابط التفعيل لحسابك الشخصي على تليجرام بنجاح! اذهب الآن لتليجرام واضغط على الرابط ليتم التحديث الفوري للجميع.');
                } else {
                    alert('خطأ: تأكد من صحة التوكن والأيدي في إعدادات ملف admin.html');
                }
            })
            .catch(() => alert('حدث خطأ أثناء الاتصال المباشر بتلجرام.'))
            .finally(() => {
                saveBtn.disabled = false;
                saveBtn.innerText = "💾 حفظ وإرسال التحديث السحابي";
            });
        }
    </script>
</body>
</html>
